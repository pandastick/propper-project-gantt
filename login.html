<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  <title>PPGantt · Sign in</title>
  <style>
    :root {
      --bg: #141633;
      --bg-soft: #1B1D40;
      --text: #E2E8F0;
      --muted: #5F5F5F;
      --border: #2A2D5A;
      --accent: #495194;
      --accent-soft: rgba(73, 81, 148, 0.14);
      --accent-softer: rgba(73, 81, 148, 0.22);
      --brand: #6D639C;
      --error: #F87171;
      --success: #7EC99A;
      --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, 'Courier New', monospace;
      --display: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at top, #1E2150 0%, transparent 55%),
        radial-gradient(ellipse at bottom, #10122A 0%, transparent 60%),
        var(--bg);
    }

    ::selection {
      background: var(--accent);
      color: #fff;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s linear both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: var(--display);
      font-weight: 700;
      font-size: 44px;
      line-height: 1;
      letter-spacing: -0.02em;
      margin: 0 0 4px 0;
      color: var(--brand);
      user-select: none;
    }

    .slug {
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.02em;
      color: var(--text);
      opacity: 0.7;
      margin: 0 0 24px 0;
      user-select: none;
      animation: fadeIn 0.4s linear 0.15s both;
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 0 0 28px 0;
      animation: fadeIn 0.4s linear 0.2s both;
    }

    form.auth-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.4s linear 0.3s both;
    }

    label.field-label {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted);
      margin: 0 0 6px 0;
    }

    input.email {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input.email:focus {
      border-color: var(--accent);
      background: #1F2149;
    }

    input.email:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    input.email::placeholder {
      color: #4A4D7A;
    }

    button.submit {
      width: 100%;
      height: 48px;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.04em;
      color: #fff;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.05s, opacity 0.2s;
      -webkit-appearance: none;
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button.submit:hover:not(:disabled) {
      background: #5A639F;
      border-color: #5A639F;
    }

    button.submit:active:not(:disabled) {
      transform: scale(0.99);
    }

    button.submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.submit:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .message {
      min-height: 18px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.02em;
      line-height: 1.5;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.25s ease;
      text-align: center;
    }

    .message.visible { opacity: 1; }
    .message.error   { color: var(--error); }
    .message.success { color: var(--success); }

    .magic-fallback {
      margin: 0;
      padding: 4px 0 0;
      text-align: center;
      font-size: 12px;
      color: #64748b;
    }
    .magic-fallback a {
      color: #94a3b8;
      text-decoration: none;
      border-bottom: 1px dotted #475569;
    }
    .magic-fallback a:hover {
      color: #e2e8f0;
      border-bottom-color: #64748b;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-top-color: transparent;
      border-radius: 50%;
      display: none;
    }

    .spinner.visible {
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 480px) {
      .brand { font-size: 52px; }
    }

    @media (max-height: 640px) {
      .brand { font-size: 34px; }
      .slug { margin-bottom: 14px; }
      .subtitle { margin-bottom: 20px; }
    }
  </style>
</head>
<body>
  <main class="login-wrap" role="main" aria-label="PPGantt sign in">
    <h1 class="brand" aria-label="PPGantt">PPGantt</h1>
    <p class="slug" id="slug-label">Sign in</p>
    <p class="subtitle" id="subtitle">Sign in</p>

    <!-- Primary form: email + password -->
    <form class="auth-form" id="auth-form" novalidate>
      <div>
        <label class="field-label" for="email">Email</label>
        <input
          class="email"
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          inputmode="email"
          required
          placeholder="you@example.com"
          aria-label="Email address"
        />
      </div>
      <div>
        <label class="field-label" for="password">Password</label>
        <input
          class="email"
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          placeholder="••••••••"
          aria-label="Password"
        />
      </div>
      <button class="submit" id="submit-btn" type="submit">
        <span id="submit-label">Sign in</span>
        <span class="spinner" id="spinner" aria-hidden="true"></span>
      </button>
      <p class="message" id="message" role="status" aria-live="polite"></p>
      <p class="magic-fallback">
        <a href="#" id="magic-link-toggle">Email me a magic link instead</a>
      </p>
    </form>

    <!-- Change-password form: shown after login when must_change_password=true -->
    <form class="auth-form" id="change-password-form" style="display:none;" novalidate>
      <p class="subtitle" style="margin-bottom: 18px; color: #f59e0b;">
        You're using a temporary password. Set a new one to continue.
      </p>
      <div>
        <label class="field-label" for="new-password">New password</label>
        <input
          class="email"
          id="new-password"
          name="new-password"
          type="password"
          autocomplete="new-password"
          required
          minlength="10"
          placeholder="At least 10 characters"
          aria-label="New password"
        />
      </div>
      <div>
        <label class="field-label" for="new-password-confirm">Confirm new password</label>
        <input
          class="email"
          id="new-password-confirm"
          name="new-password-confirm"
          type="password"
          autocomplete="new-password"
          required
          minlength="10"
          placeholder="Re-enter new password"
          aria-label="Confirm new password"
        />
      </div>
      <button class="submit" id="change-password-btn" type="submit">
        <span id="change-password-label">Set new password</span>
        <span class="spinner" id="change-password-spinner" aria-hidden="true"></span>
      </button>
      <p class="message" id="change-password-message" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase-config.js';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
      },
    });

    const form = document.getElementById('auth-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const submitLabel = document.getElementById('submit-label');
    const spinner = document.getElementById('spinner');
    const messageEl = document.getElementById('message');
    const slugLabelEl = document.getElementById('slug-label');
    const magicLinkToggle = document.getElementById('magic-link-toggle');

    const changePasswordForm = document.getElementById('change-password-form');
    const newPasswordInput = document.getElementById('new-password');
    const newPasswordConfirmInput = document.getElementById('new-password-confirm');
    const changePasswordBtn = document.getElementById('change-password-btn');
    const changePasswordLabel = document.getElementById('change-password-label');
    const changePasswordSpinner = document.getElementById('change-password-spinner');
    const changePasswordMessage = document.getElementById('change-password-message');

    // When true, the next submit sends a magic-link OTP instead of a password.
    let magicLinkMode = false;

    // Set subtitle from ?redirect= param: "Sign in to societist" or just "Sign in"
    (function setSlugLabel() {
      try {
        const params = new URLSearchParams(window.location.search);
        const r = params.get('redirect');
        if (r && /^\/[a-z0-9-]+$/.test(r)) {
          const s = r.replace(/^\//, '');
          slugLabelEl.textContent = 'Sign in to ' + s;
        }
      } catch (_) { /* keep default */ }
    })();

    // Show logout confirmation if arrived via ?logout=1
    (function showLogoutFlash() {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('logout') === '1') {
          showMessage('Signed out.', null);
        }
      } catch (_) {}
    })();

    function safeRedirectTarget() {
      try {
        const params = new URLSearchParams(window.location.search);
        const r = params.get('redirect');
        if (r && r.charAt(0) === '/' && r.indexOf('//') === -1) return r;
      } catch (_) {}
      return '/';
    }

    function setLoading(on) {
      submitBtn.disabled = on;
      emailInput.disabled = on;
      passwordInput.disabled = on;
      if (on) {
        submitLabel.textContent = magicLinkMode ? 'Sending...' : 'Signing in...';
        spinner.classList.add('visible');
      } else {
        submitLabel.textContent = magicLinkMode ? 'Send magic link' : 'Sign in';
        spinner.classList.remove('visible');
      }
    }

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.classList.remove('error', 'success');
      if (type) messageEl.classList.add(type);
      // force reflow so the fade animates on re-show
      void messageEl.offsetWidth;
      messageEl.classList.add('visible');
    }

    function hideMessage() {
      messageEl.classList.remove('visible');
    }

    // Toggle between password and magic-link modes. Hides the password
    // field in magic-link mode so the form stays minimal.
    magicLinkToggle.addEventListener('click', (e) => {
      e.preventDefault();
      magicLinkMode = !magicLinkMode;
      passwordInput.closest('div').style.display = magicLinkMode ? 'none' : '';
      passwordInput.required = !magicLinkMode;
      submitLabel.textContent = magicLinkMode ? 'Send magic link' : 'Sign in';
      magicLinkToggle.textContent = magicLinkMode
        ? 'Use a password instead'
        : 'Email me a magic link instead';
      hideMessage();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const email = (emailInput.value || '').trim();
      const password = passwordInput.value || '';

      if (!emailInput.checkValidity()) {
        emailInput.reportValidity();
        return;
      }

      const redirect = safeRedirectTarget();

      if (magicLinkMode) {
        const emailRedirectTo =
          window.location.origin + '/auth-callback.html?next=' + encodeURIComponent(redirect);
        setLoading(true);
        try {
          const { error } = await supabase.auth.signInWithOtp({
            email,
            options: { emailRedirectTo, shouldCreateUser: false },
          });
          if (error && !/not.*found|sign.*up|invalid.*login/i.test(error.message || '')) {
            showMessage('Could not send. Try again.', 'error');
          } else {
            showMessage('Check your email for a link to sign in.', 'success');
          }
        } catch (_) {
          showMessage('Could not send. Try again.', 'error');
        } finally {
          setLoading(false);
        }
        return;
      }

      // Password sign-in path
      if (!password) {
        passwordInput.reportValidity();
        return;
      }
      setLoading(true);
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          showMessage('Incorrect email or password.', 'error');
          setLoading(false);
          return;
        }
        // Post-sign-in: if the user's metadata has must_change_password,
        // show the change-password form before redirecting. Otherwise
        // redirect straight to the intended destination.
        const mustChange =
          data && data.user && data.user.user_metadata &&
          data.user.user_metadata.must_change_password === true;
        if (mustChange) {
          form.style.display = 'none';
          changePasswordForm.style.display = '';
          document.getElementById('subtitle').textContent = 'Set a new password';
          newPasswordInput.focus();
        } else {
          window.location.replace(redirect);
        }
      } catch (_) {
        showMessage('Sign-in failed. Try again.', 'error');
        setLoading(false);
      }
    });

    // Change-password submission
    changePasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      changePasswordMessage.classList.remove('visible', 'error', 'success');
      const pw1 = newPasswordInput.value;
      const pw2 = newPasswordConfirmInput.value;
      if (pw1.length < 10) {
        changePasswordMessage.textContent = 'Password must be at least 10 characters.';
        changePasswordMessage.classList.add('visible', 'error');
        return;
      }
      if (pw1 !== pw2) {
        changePasswordMessage.textContent = 'Passwords do not match.';
        changePasswordMessage.classList.add('visible', 'error');
        return;
      }
      changePasswordBtn.disabled = true;
      changePasswordLabel.textContent = 'Saving...';
      changePasswordSpinner.classList.add('visible');
      try {
        const { error } = await supabase.auth.updateUser({
          password: pw1,
          data: { must_change_password: false },
        });
        if (error) {
          changePasswordMessage.textContent = 'Could not save. Try again.';
          changePasswordMessage.classList.add('visible', 'error');
          changePasswordBtn.disabled = false;
          changePasswordLabel.textContent = 'Set new password';
          changePasswordSpinner.classList.remove('visible');
          return;
        }
        // Redirect into the app.
        window.location.replace(safeRedirectTarget());
      } catch (_) {
        changePasswordMessage.textContent = 'Could not save. Try again.';
        changePasswordMessage.classList.add('visible', 'error');
        changePasswordBtn.disabled = false;
        changePasswordLabel.textContent = 'Set new password';
        changePasswordSpinner.classList.remove('visible');
      }
    });

    // If user is already signed in, bounce straight to the redirect target.
    (async function maybeBypass() {
      try {
        const { data } = await supabase.auth.getSession();
        if (data && data.session) {
          const r = safeRedirectTarget();
          // Only auto-redirect for gated slug routes, never to /
          if (/^\/[a-z0-9-]+$/.test(r)) {
            window.location.replace(r);
          }
        }
      } catch (_) { /* ignore */ }
    })();
  </script>
</body>
</html>
