# Netlify config for the PPGantt hosted instance.
#
# Public OSS users: this file is safe to ignore. It only affects deployment
# to Netlify. The viewer still runs locally via `npm start` regardless.
#
# Auth is delegated to Supabase Auth (magic-link). The publishable (anon)
# key and Supabase URL live in js/supabase-config.js. The Netlify Function
# get-roadmap.js verifies the caller's Supabase JWT against Supabase's
# JWKS / a shared secret — see that function for details.

[build]
  publish = "."
  functions = "netlify/functions"
  # npm install ensures jsonwebtoken (and any future function deps) are
  # bundled with the Netlify Functions. Without this, the build may skip
  # dependency installation and the Functions 500 on require().
  command = "npm install"

# Route each private slug to index.html. The viewer detects the slug from
# the URL via js/supabase-gate.js and fetches the correct roadmap through
# the Netlify Function. Add more slugs here as needed (e.g. /rvms, /cpu).
[[redirects]]
  from = "/societist"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

# Supabase magic-link callback lands here. We serve index.html; the
# Supabase JS client runs on page load, reads the tokens from the URL
# hash, persists the session, and then supabase-gate.js routes the
# user to the `next` slug.
[[redirects]]
  from = "/auth/callback"
  to = "/index.html"
  status = 200

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
